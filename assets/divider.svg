<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 24">
  <defs>
    <linearGradient id="edgeFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="8%" stop-color="#ffffff"/>
      <stop offset="92%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <mask id="fade"><rect width="880" height="24" fill="url(#edgeFade)"/></mask>
  </defs>
  <g mask="url(#fade)">
    <line x1="0" y1="12" x2="880" y2="12" stroke="#7d8590" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="5 6"/>
    <!-- duplex traffic: input → / ← output -->
    <rect x="-30" y="8" width="20" height="8" rx="2" fill="#8b949e" opacity="0.75">
      <animate attributeName="x" from="-30" to="890" dur="8s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="8" width="20" height="8" rx="2" fill="#8b949e" opacity="0.45">
      <animate attributeName="x" from="-30" to="890" dur="11s" begin="2.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="-30" y="8" width="20" height="8" rx="2" fill="#8b949e" opacity="0.6">
      <animate attributeName="x" from="-30" to="890" dur="13s" begin="5.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="890" y="8" width="20" height="8" rx="2" fill="#8b949e" opacity="0.55">
      <animate attributeName="x" from="890" to="-30" dur="9s" begin="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="890" y="8" width="20" height="8" rx="2" fill="#8b949e" opacity="0.35">
      <animate attributeName="x" from="890" to="-30" dur="12s" begin="4.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
